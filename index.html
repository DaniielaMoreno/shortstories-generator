<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Short-Stories</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oooh+Baby&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="src/style.css" />
	</head>
	<body>
		<div class="scene">
			<!-- Layer 0: dog + bed, always visible -->
			<img
				class="scene__dog"
				src="https://s3.amazonaws.com/shecodesio-production/uploads/files/000/178/933/original/Sleeping_Dog_.png?1773267456"
				alt="A white dog with black ears sleeping on a human bed"
			/>

			<!-- Layer 1: cloud image, hidden until dream is triggered -->
			<img
				class="scene__cloud"
				id="cloudImg"
				src="https://s3.amazonaws.com/shecodesio-production/uploads/files/000/179/094/original/Cloud.png?1773837671"
				alt=""
			/>

			<!-- Layer 2: story text, scrollable, hidden until dream is triggered -->
			<div class="scene__story-box" id="storyBox">
				<p class="scene__story" id="shortStory"></p>
			</div>

			<!-- Invisible button over the ball illustration — resets the scene -->
			<button
				class="scene__ball-btn"
				id="ballBtn"
				aria-label="Start again"
			></button>

			<!-- Search form, floats over the scene top-left -->
			<div class="form-container" id="formContainer">
				<form id="storyForm">
					<input
						type="text"
						placeholder="Type a word..."
						required
						autofocus
						autocomplete="off"
						class="search-input"
						id="searchInput"
					/>
					<input type="submit" value="Dream" class="search-button" />
				</form>
			</div>

			<footer>
				Code and illustrations by
				<a href="https://github.com/DaniielaMoreno" target="_blank"
					>Daniela Moreno</a
				>
				<br />
				This project is open-sourced on
				<a
					href="https://github.com/DaniielaMoreno/shortstories-generator"
					target="_blank"
					>Github</a
				>
				and hosted on
				<a href="https://shortstories-generator.netlify.app/">Netlify</a>
			</footer>
		</div>

		<script src="index.js"></script>
	</body>
</html>
